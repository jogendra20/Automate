name: Nexus Recon
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to recon'
        required: true
      site_key:
        description: 'Key to store selectors under e.g. tickertape.in/market-movers'
        required: true

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run recon
        run: |
          python3 - << 'PYEOF'
          from playwright.sync_api import sync_playwright
          import time, json, os

          url = '${{ github.event.inputs.url }}'
          site_key = '${{ github.event.inputs.site_key }}'

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, args=['--no-sandbox','--disable-dev-shm-usage'])
              page = browser.new_page(viewport={'width':1280,'height':800})
              try:
                  page.goto(url, wait_until='domcontentloaded', timeout=45000)
                  time.sleep(15)
                  page.evaluate('window.scrollTo(0, 500)')
                  time.sleep(5)
                  body = page.inner_text('body')
                  links = [a.get_attribute('href') or '' for a in page.query_selector_all('a[href]')][:30]
                  inputs = [i.get_attribute('name') or i.get_attribute('placeholder') or '' for i in page.query_selector_all('input')][:10]
                  buttons = [b.inner_text().strip() for b in page.query_selector_all('button')][:15]
                  tables = len(page.query_selector_all('table'))
                  has_stock_links = len(page.query_selector_all("a[href*='/stocks/']")) > 0
                  result = {
                      'site_key': site_key,
                      'url': url,
                      'body_sample': body[:1000],
                      'buttons': [b for b in buttons if b],
                      'inputs': [i for i in inputs if i],
                      'link_patterns': list(set([l.split('?')[0] for l in links if l and l.startswith('/')])[:15]),
                      'tables': tables,
                      'has_stock_links': has_stock_links,
                      'run_id': '${{ github.run_id }}'
                  }
                  print(json.dumps(result))
              except Exception as e:
                  print(json.dumps({'site_key': site_key, 'url': url, 'error': str(e), 'run_id': '${{ github.run_id }}'}))
              finally:
                  browser.close()
          PYEOF
        id: recon

      - name: Send to Nexus
        run: |
          python3 - << 'PYEOF'
          import subprocess, json, urllib.request
          out = subprocess.check_output(['python3', '-c', """
          """], stderr=subprocess.STDOUT).decode()
          PYEOF

      - name: Store recon in Nexus
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          from playwright.sync_api import sync_playwright
          import time, json, os, urllib.request

          url = '${{ github.event.inputs.url }}'
          site_key = '${{ github.event.inputs.site_key }}'
          nexus_url = os.environ['NEXUS_URL']
          nexus_key = os.environ['NEXUS_API_KEY']

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, args=['--no-sandbox','--disable-dev-shm-usage'])
              page = browser.new_page(viewport={'width':1280,'height':800})
              try:
                  page.goto(url, wait_until='domcontentloaded', timeout=45000)
                  time.sleep(15)
                  page.evaluate('window.scrollTo(0, 500)')
                  time.sleep(5)
                  body = page.inner_text('body')
                  buttons = [b.inner_text().strip() for b in page.query_selector_all('button')][:15]
                  inputs = [i.get_attribute('name') or i.get_attribute('placeholder') or '' for i in page.query_selector_all('input')][:10]
                  links = [a.get_attribute('href') or '' for a in page.query_selector_all('a[href]')][:30]
                  has_stock_links = len(page.query_selector_all("a[href*='/stocks/']")) > 0
                  tables = len(page.query_selector_all('table'))
                  result = {
                      'site_key': site_key,
                      'url': url,
                      'body_sample': body[:1000],
                      'buttons': [b for b in buttons if b],
                      'inputs': [i for i in inputs if i],
                      'link_patterns': list(set([l.split('?')[0] for l in links if l.startswith('/')])[:15]),
                      'tables': tables,
                      'has_stock_links': has_stock_links,
                      'run_id': '${{ github.run_id }}'
                  }
              except Exception as e:
                  result = {'site_key': site_key, 'url': url, 'error': str(e), 'run_id': '${{ github.run_id }}'}
              finally:
                  browser.close()

          payload = json.dumps(result).encode()
          req = urllib.request.Request(
              f'{nexus_url}/store-recon',
              data=payload,
              headers={'Content-Type':'application/json','X-API-Key':nexus_key}
          )
          try:
              urllib.request.urlopen(req, timeout=15)
              print('Recon stored in Nexus')
          except Exception as e:
              print(f'Store failed: {e}')
          PYEOF
