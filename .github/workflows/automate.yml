name: Nexus Automation
on:
  workflow_dispatch:
    inputs:
      script_path:
        description: 'Script path to run'
        required: true
      task:
        description: 'Task description'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright scrapling requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run and send output
        run: |
          OUTPUT=$(python ${{ github.event.inputs.script_path }} 2>&1 | head -c 3500)
          if [ -z "$OUTPUT" ]; then
            OUTPUT="Script ran but produced no output"
          fi
          python3 -c "
import sys, urllib.request, json
token = '${{ secrets.TELEGRAM_BOT_TOKEN }}'
chat_id = '${{ secrets.TELEGRAM_CHAT_ID }}'
output = sys.argv[1]
text = '📤 Automation Output\n\n' + output
data = json.dumps({'chat_id': chat_id, 'text': text}).encode()
req = urllib.request.Request(f'https://api.telegram.org/bot{token}/sendMessage', data=data, headers={'Content-Type': 'application/json'})
urllib.request.urlopen(req)
" "$OUTPUT"

      - name: Report to Nexus
        run: |
          curl -X POST ${{ secrets.NEXUS_URL }}/result \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.NEXUS_API_KEY }}" \
            -d "{\"task\":\"automation\",\"success\":true,\"response_time_ms\":0}" || true
