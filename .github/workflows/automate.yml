name: Nexus Automation
on:
  workflow_dispatch:
    inputs:
      script_path:
        description: 'Script path to run'
        required: true
      task:
        description: 'Task description'
        required: false
      difficulty:
        description: 'easy/medium/hard'
        required: false
        default: 'easy'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright scrapling requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run and send output
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python ${{ github.event.inputs.script_path }} > output.txt 2>&1 || true
          python3 send_output.py

      - name: Cleanup script
        env:
          DIFFICULTY: ${{ github.event.inputs.difficulty }}
          SCRIPT_PATH: ${{ github.event.inputs.script_path }}
        run: |
          git config user.email "nexus@bot.com"
          git config user.name "Nexus Bot"
          if [ "$DIFFICULTY" = "hard" ]; then
            mkdir -p archive
            git mv "$SCRIPT_PATH" "archive/$(basename $SCRIPT_PATH)"
            git commit -m "archive: $(basename $SCRIPT_PATH)"
          else
            git rm "$SCRIPT_PATH"
            git commit -m "cleanup: $(basename $SCRIPT_PATH)"
          fi
          git push
        continue-on-error: true

      - name: Report to Nexus
        run: |
          curl -X POST ${{ secrets.NEXUS_URL }}/result \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.NEXUS_API_KEY }}" \
            -d "{\"task\":\"automation\",\"success\":true,\"response_time_ms\":0}" || true
