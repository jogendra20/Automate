name: Nexus Automation
on:
  workflow_dispatch:
    inputs:
      script_path:
        description: 'Script path to run'
        required: true
      task:
        description: 'Task description'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright scrapling
          playwright install chromium
          playwright install-deps chromium

      - name: Run script
        run: |
          START=$(date +%s%3N)
          python ${{ github.event.inputs.script_path }} && echo "SUCCESS=true" >> $GITHUB_ENV || echo "SUCCESS=false" >> $GITHUB_ENV
          END=$(date +%s%3N)
          echo "ELAPSED=$((END-START))" >> $GITHUB_ENV
        continue-on-error: true

      - name: Send output to Telegram
        run: |
          if [ -f output.json ]; then
            OUTPUT=$(cat output.json | head -c 3500)
          else
            OUTPUT="No output.json found"
          fi
          if [ -z "$OUTPUT" ]; then
            OUTPUT="Script ran but output was empty"
          fi
          python3 -c "
import os, requests
token = '${{ secrets.TELEGRAM_BOT_TOKEN }}'
chat_id = '${{ secrets.TELEGRAM_CHAT_ID }}'
output = os.environ.get('OUTPUT', 'empty')
text = '📤 Automation Output

' + output[:3500]
requests.post(f'https://api.telegram.org/bot{token}/sendMessage', json={'chat_id': chat_id, 'text': text})
" 
        env:
          OUTPUT: ${{ env.OUTPUT }}

      - name: Report to Nexus
        run: |
          curl -X POST ${{ secrets.NEXUS_URL }}/result \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.NEXUS_API_KEY }}" \
            -d "{\"task\":\"automation\",\"success\":${{ env.SUCCESS }},\"response_time_ms\":${{ env.ELAPSED }}}"
